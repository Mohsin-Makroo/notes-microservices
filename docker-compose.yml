version: '3.8'

services:

  # ── Databases ──────────────────────────────────────────

  auth-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - notes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - notes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  notes-db:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - notes-db-data:/data/db
    networks:
      - notes-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Backend Services ───────────────────────────────────

  auth-service:
    build: ./auth-service
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: auth_db
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - notes-network

  user-service:
    build: ./user-service
    restart: unless-stopped
    environment:
      PORT: 3002
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: user-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: user_db
    volumes:
      - user-uploads:/app/uploads
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - notes-network

  notes-service:
    build: ./notes-service
    restart: unless-stopped
    environment:
      PORT: 3003
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      MONGO_URI: mongodb://notes-db:27017/notes_db
    depends_on:
      notes-db:
        condition: service_healthy
    networks:
      - notes-network

  # ── Frontend ───────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_APP_NAME: ${VITE_APP_NAME}
    restart: unless-stopped
    networks:
      - notes-network

  # ── Nginx Gateway ──────────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - auth-service
      - user-service
      - notes-service
    networks:
      - notes-network

networks:
  notes-network:
    driver: bridge

volumes:
  auth-db-data:
  user-db-data:
  notes-db-data:
  user-uploads:
